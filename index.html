<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IREN Calls" />
  <meta name="description" content="IREN Covered Call Signal System" />
  <link rel="manifest" href="manifest.json" />
  <title>IREN · Covered Call System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── NATIVE DARK THEME ──────────────────────────────────────────────────────
       Elevation system: bg → surface-1 → surface-2 → surface-3
       Pure #000 avoided — causes halation on OLED. Using offset blacks.
       Accent: emerald green (#00e87a) — legible on dark without eye strain.
       Border strategy: low-opacity white, brightens on hover/active.
    ─────────────────────────────────────────────────────────────────────────── */
    :root {
      /* Core palette */
      --bg:          #0d0d0f;   /* true app background — near black, warm tint */
      --surface-1:   #141416;   /* cards, panels */
      --surface-2:   #1c1c1f;   /* elevated cards, hover states */
      --surface-3:   #242428;   /* active states, selected */

      /* Borders — 3 levels */
      --border-1:    rgba(255,255,255,0.06);   /* subtle dividers */
      --border-2:    rgba(255,255,255,0.10);   /* card outlines */
      --border-3:    rgba(255,255,255,0.18);   /* active/focused */

      /* Typography */
      --text-primary:   #f0f0f2;  /* headings, key data */
      --text-secondary: #9898a0;  /* labels, descriptions */
      --text-tertiary:  #52525a;  /* timestamps, hints */
      --text-disabled:  #35353d;  /* placeholders */

      /* Accent colors — tuned for dark backgrounds */
      --green:       #00e87a;
      --green-soft:  rgba(0,232,122,0.10);
      --green-edge:  rgba(0,232,122,0.22);
      --green-glow:  rgba(0,232,122,0.35);

      --amber:       #f5a623;
      --amber-soft:  rgba(245,166,35,0.10);
      --amber-edge:  rgba(245,166,35,0.22);

      --red:         #ff4f6a;
      --red-soft:    rgba(255,79,106,0.10);
      --red-edge:    rgba(255,79,106,0.22);

      --blue:        #4da3ff;
      --blue-soft:   rgba(77,163,255,0.10);
      --blue-edge:   rgba(77,163,255,0.22);

      /* Typography */
      --mono: 'IBM Plex Mono', 'Fira Code', monospace;
      --sans: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      /* Safe areas */
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left:   env(safe-area-inset-left, 0px);
      --safe-right:  env(safe-area-inset-right, 0px);

      /* Radii */
      --r-sm:  8px;
      --r-md:  12px;
      --r-lg:  16px;

      /* Shadows for elevation */
      --shadow-1: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
      --shadow-2: 0 4px 12px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
      --shadow-3: 0 8px 24px rgba(0,0,0,0.6), 0 4px 8px rgba(0,0,0,0.4);
    }

    /* ── GLOBAL ── */
    html {
      height: 100%;
      -webkit-text-size-adjust: 100%;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: var(--sans);
      overflow: hidden;
      line-height: 1.5;
    }

    ::-webkit-scrollbar { width: 3px; height: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border-3); }

    /* ── APP SHELL ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      min-height: 100dvh;
      padding-top: var(--safe-top);
    }

    /* ── HEADER ── */
    .header {
      background: rgba(13,13,15,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-1);
      padding: 16px 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo { display: flex; flex-direction: column; gap: 3px; }

    .logo-wordmark {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-ticker {
      font-family: var(--mono);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: 0.02em;
      line-height: 1;
    }

    .logo-divider {
      width: 1px;
      height: 16px;
      background: var(--border-2);
    }

    .logo-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.10em;
      text-transform: uppercase;
    }

    .logo-meta {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-disabled);
      letter-spacing: 0.06em;
      margin-top: 1px;
    }

    /* ── RUN BUTTON ── */
    .run-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      flex-shrink: 0;
    }

    .run-btn {
      padding: 9px 16px;
      background: var(--green-soft);
      border: 1px solid var(--green-edge);
      border-radius: var(--r-sm);
      color: var(--green);
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      white-space: nowrap;
    }

    .run-btn:hover:not(.loading) {
      background: rgba(0,232,122,0.16);
      border-color: var(--green-glow);
    }

    .run-btn:active:not(.loading) { transform: scale(0.96); }

    .run-btn.loading {
      color: var(--text-tertiary);
      border-color: var(--border-1);
      background: var(--surface-1);
      cursor: default;
    }

    .pulse-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 0 var(--green-glow);
      animation: sonar 2s ease-out infinite;
      flex-shrink: 0;
    }

    .next-check {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-disabled);
      letter-spacing: 0.06em;
    }

    /* ── TABS ── */
    .tabs {
      display: flex;
      overflow-x: auto;
      scrollbar-width: none;
      gap: 4px;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab-btn {
      padding: 9px 18px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-tertiary);
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.04em;
      white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }

    .tab-btn:hover { color: var(--text-secondary); }

    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--green);
    }

    /* ── CONTENT SCROLL AREA ── */
    .content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      padding: 18px 20px;
      padding-bottom: calc(18px + var(--safe-bottom));
    }

    /* Desktop: max-width centered */
    @media (min-width: 680px) {
      .header { padding: 18px 32px 0; }
      .content { padding: 24px 32px; max-width: 860px; margin: 0 auto; width: 100%; }
      .content-inner { max-width: 860px; margin: 0 auto; }
    }

    /* ── TICKER GRID ── */
    .tickers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }

    @media (min-width: 520px) {
      .tickers { grid-template-columns: repeat(4, 1fr); }
    }

    .ticker-card {
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: var(--r-md);
      padding: 14px 16px;
      box-shadow: var(--shadow-1);
      transition: border-color 0.15s;
    }

    .ticker-card:hover { border-color: var(--border-2); }

    .ticker-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .ticker-value {
      font-family: var(--mono);
      font-size: 21px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.01em;
    }

    .ticker-sub {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 4px;
      font-family: var(--mono);
      letter-spacing: 0.02em;
    }

    /* ── SIGNAL BADGE ── */
    .signal-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 18px;
      border-radius: var(--r-md);
      margin-bottom: 12px;
      box-shadow: var(--shadow-1);
    }

    .signal-text { display: flex; flex-direction: column; gap: 2px; }

    .signal-label {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      line-height: 1;
    }

    .signal-strength {
      font-family: var(--mono);
      font-size: 10px;
      opacity: 0.55;
      letter-spacing: 0.08em;
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: var(--r-md);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-1);
    }

    .card-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .reasoning-text {
      font-size: 13px;
      line-height: 1.75;
      color: var(--text-secondary);
    }

    /* ── TRADE SETUP ── */
    .trade-card {
      background: var(--surface-1);
      border: 1px solid var(--green-edge);
      border-radius: var(--r-md);
      padding: 16px;
      margin-bottom: 10px;
      box-shadow: var(--shadow-1);
    }

    .trade-card-header {
      font-size: 9px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 14px;
      opacity: 0.8;
    }

    .trade-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .trade-item-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .trade-item-value {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .basis-bar {
      grid-column: 1 / -1;
      margin-top: 4px;
      padding: 10px 12px;
      background: rgba(0,232,122,0.07);
      border: 1px solid rgba(0,232,122,0.12);
      border-radius: var(--r-sm);
      font-size: 11px;
      color: rgba(0,232,122,0.75);
      line-height: 1.5;
    }

    /* ── INFO CARDS ── */
    .info-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .info-card {
      padding: 13px 14px;
      border-radius: var(--r-md);
      border: 1px solid;
      box-shadow: var(--shadow-1);
    }

    .info-card-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .info-card-body {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.65;
    }

    .timestamp {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-disabled);
      text-align: right;
      margin-top: 6px;
      letter-spacing: 0.04em;
    }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 72px 24px;
      gap: 14px;
      text-align: center;
    }

    .empty-icon { font-size: 40px; line-height: 1; }

    .empty-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-tertiary);
    }

    .empty-sub {
      font-size: 12px;
      color: var(--text-disabled);
      line-height: 1.6;
      max-width: 260px;
    }

    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 72px 20px;
    }

    .loading-bars {
      display: flex;
      gap: 5px;
      align-items: flex-end;
      height: 36px;
    }

    .loading-bar {
      width: 4px;
      border-radius: 2px;
      background: var(--green);
      opacity: 0.5;
    }

    .loading-bar:nth-child(1) { height: 18px; animation: bar 1s ease-in-out infinite 0.00s; }
    .loading-bar:nth-child(2) { height: 30px; animation: bar 1s ease-in-out infinite 0.12s; }
    .loading-bar:nth-child(3) { height: 22px; animation: bar 1s ease-in-out infinite 0.24s; }
    .loading-bar:nth-child(4) { height: 36px; animation: bar 1s ease-in-out infinite 0.36s; }
    .loading-bar:nth-child(5) { height: 14px; animation: bar 1s ease-in-out infinite 0.48s; }

    .loading-text {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--text-tertiary);
      animation: blink 1.2s ease-in-out infinite;
    }

    /* ── CRASH COURSE ── */
    .course-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 18px;
    }

    .course-nav-btn {
      padding: 7px 13px;
      border-radius: 20px;
      border: 1px solid var(--border-1);
      background: transparent;
      color: var(--text-tertiary);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: var(--sans);
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
      letter-spacing: 0.02em;
    }

    .course-nav-btn:hover { color: var(--text-secondary); border-color: var(--border-2); }

    .course-nav-btn.active {
      background: var(--surface-2);
      border-color: var(--border-3);
      color: var(--text-primary);
      box-shadow: var(--shadow-1);
    }

    .course-title {
      font-size: 17px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 14px;
      letter-spacing: -0.01em;
    }

    .accordion-item {
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: var(--r-md);
      margin-bottom: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-1);
      transition: border-color 0.15s;
    }

    .accordion-item:hover { border-color: var(--border-2); }
    .accordion-item.open { border-color: var(--border-2); }

    .accordion-header {
      padding: 15px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      background: transparent;
      border: none;
      width: 100%;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
      gap: 12px;
    }

    .accordion-header.open { background: var(--surface-2); }

    .accordion-heading {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
      line-height: 1.4;
    }

    .accordion-chevron {
      color: var(--text-tertiary);
      font-size: 10px;
      flex-shrink: 0;
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
      line-height: 1;
    }

    .accordion-chevron.open {
      transform: rotate(180deg);
      color: var(--text-secondary);
    }

    .accordion-body {
      padding: 14px 18px 16px;
      border-top: 1px solid var(--border-1);
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.78;
      white-space: pre-wrap;
      word-break: break-word;
      background: var(--surface-1);
    }

    /* ── HISTORY ── */
    .history-entry {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 16px;
      background: var(--surface-1);
      border: 1px solid var(--border-1);
      border-radius: var(--r-md);
      margin-bottom: 6px;
      box-shadow: var(--shadow-1);
      transition: border-color 0.15s;
    }

    .history-entry:hover { border-color: var(--border-2); }

    .history-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .history-mid { flex: 1; min-width: 0; }

    .history-signal {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .history-time {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 2px;
      font-family: var(--mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-right { text-align: right; flex-shrink: 0; }

    .history-price {
      font-family: var(--mono);
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .history-iv {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-tertiary);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .clear-btn {
      font-size: 11px;
      color: rgba(255,79,106,0.35);
      background: none;
      border: none;
      cursor: pointer;
      font-family: var(--mono);
      letter-spacing: 0.06em;
      padding: 4px 0;
      transition: color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .clear-btn:hover { color: var(--red); }

    /* ── ERROR ── */
    .error-card {
      padding: 14px 16px;
      background: var(--red-soft);
      border: 1px solid var(--red-edge);
      border-radius: var(--r-md);
      font-size: 12px;
      font-family: var(--mono);
      color: var(--red);
      line-height: 1.65;
    }

    /* ── NOTIFICATION ── */
    .notification {
      position: fixed;
      top: max(calc(var(--safe-top) + 10px), 12px);
      left: 14px;
      right: 14px;
      padding: 13px 16px;
      border-radius: var(--r-md);
      border: 1px solid;
      display: flex;
      align-items: center;
      gap: 11px;
      z-index: 999;
      backdrop-filter: blur(24px) saturate(200%);
      -webkit-backdrop-filter: blur(24px) saturate(200%);
      box-shadow: var(--shadow-3);
      transform: translateY(calc(-100% - 20px));
      transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      max-width: 480px;
    }

    @media (min-width: 520px) {
      .notification { left: auto; right: 20px; min-width: 320px; }
    }

    .notification.show { transform: translateY(0); }

    .notif-icon { font-size: 18px; flex-shrink: 0; line-height: 1; }
    .notif-body { flex: 1; }
    .notif-title { font-size: 13px; font-weight: 700; line-height: 1; }
    .notif-sub { font-size: 11px; opacity: 0.65; margin-top: 3px; font-family: var(--mono); }

    /* ── ANIMATIONS ── */
    @keyframes sonar {
      0%   { box-shadow: 0 0 0 0 var(--green-glow); }
      70%  { box-shadow: 0 0 0 7px rgba(0,232,122,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,232,122,0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    @keyframes blink {
      0%, 100% { opacity: 0.9; }
      50%       { opacity: 0.25; }
    }

    @keyframes bar {
      0%, 100% { transform: scaleY(0.45); opacity: 0.35; }
      50%       { transform: scaleY(1);    opacity: 1; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

// ─── SIGNAL ENGINE ────────────────────────────────────────────────────────────
async function fetchSignal() {
  const prompt = `You are an options trading signal engine for a sophisticated retail investor.

The investor holds 300 shares of IREN (Iris Energy / AI infrastructure) at an average cost basis of $46.79/share.
They want to sell covered calls on their position to generate income.

Today's date and time: ${new Date().toLocaleString("en-US", { timeZone: "America/New_York" })} ET

Please use web search to find IREN's current stock price and any recent news, then analyze:
1. Current IREN stock price and today's % move
2. Estimate IV Rank (IREN beta ~2.0, volatile AI/crypto infrastructure, 52-week range $5-$77)
3. Any catalysts today (earnings May 13 2026, MSCI inclusion effective Feb 27 2026, crypto/Bitcoin moves, Fed events)
4. Whether to SELL, WAIT, or HOLD_EXISTING covered calls

Return ONLY a raw JSON object, no markdown, no explanation outside JSON:
{
  "price": <number>,
  "priceChange": <number, % change today>,
  "ivRank": <number 0-100>,
  "ivLevel": <"LOW" | "MODERATE" | "HIGH" | "EXTREME">,
  "signal": <"SELL" | "WAIT" | "HOLD_EXISTING">,
  "signalStrength": <"STRONG" | "MODERATE" | "WEAK">,
  "suggestedStrike": <number>,
  "suggestedExpiry": <string>,
  "suggestedDTE": <number>,
  "estimatedPremium": <string>,
  "estimatedMonthlyYield": <string>,
  "reasoning": <string, 2-3 sentences>,
  "catalysts": <string>,
  "costBasisProgress": <string>,
  "warnings": <string or null>
}`;

  const resp = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }],
    }),
  });

  const data = await resp.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error("No JSON returned from signal engine");
  return JSON.parse(match[0]);
}

function getNextCheckLabel() {
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const cur = et.getHours() * 60 + et.getMinutes();
  const checks = [[9,30,'9:30 AM ET'], [12,30,'12:30 PM ET'], [15,50,'3:50 PM ET']];
  const next = checks.find(([h,m]) => h*60+m > cur);
  return next ? `Auto: ${next[2]}` : 'Auto: Tomorrow 9:30 AM ET';
}

async function runCheck() {

  state.loading = true;

  try {
    const result = await fetchSignal();
    const ts = new Date().toLocaleString("en-US", { timeZone: "America/New_York" }) + " ET";
    state.signal = result;
    state.timestamp = ts;

    const entry = { signal: result, timestamp: ts };
    state.history = [entry, ...state.history].slice(0, 25);
    saveHistory();

    const sc = SIG[result.signal] || SIG.WAIT;
    showNotification(sc.label, `IREN $${result.price?.toFixed(2)} · IV Rank ${result.ivRank}`, sc.color);
  } catch (e) {
    state.error = e.message;
  } finally {
    state.loading = false;
    render();
  }
}

// ─── RENDER HELPERS ──────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else if (k === 'innerHTML') e.innerHTML = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c === null || c === undefined) continue;
    if (typeof c === 'string') e.appendChild(document.createTextNode(c));
    else e.appendChild(c);
  }
  return e;
}

function div(cls, ...children) { return el('div', { className: cls }, ...children); }
function span(cls, text) { return el('span', { className: cls }, text); }
function button(cls, text, onClick) { return el('button', { className: cls, onClick }, text); }

    notif.style.borderColor = n.color + '40';
    notif.style.background = n.color + '18';

    notif.appendChild(div('notif-icon', '🔔'));
    const nb = div('notif-body');
    nb.appendChild(el('div', { className: 'notif-title', style: { color: n.color } }, n.title));
    nb.appendChild(div('notif-sub', n.sub));
    notif.appendChild(nb);
    app.appendChild(notif);

    // Animate in
    requestAnimationFrame(() => {
      requestAnimationFrame(() => notif.classList.add('show'));
    });
  }
}

// ─── SCHEDULER ───────────────────────────────────────────────────────────────
setInterval(() => {
  const now = new Date();
  const et = new Date(now.toLocaleString("en-US", { timeZone: "America/New_York" }));
  const h = et.getHours(), m = et.getMinutes(), s = et.getSeconds();
  const isCheck = [[9,30],[12,30],[15,50]].some(([ch,cm]) => h===ch && m===cm && s<30);
  if (isCheck && !state.loading) runCheck();

  // Update next check label without full re-render
  const nc = document.querySelector('.next-check');
  if (nc) nc.textContent = getNextCheckLabel();
}, 15000);

// ─── INIT ────────────────────────────────────────────────────────────────────
await loadHistory();
render();
</script>
</body>
</html>
