<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
  <meta name="theme-color" content="#0d0d0f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Options Dashboard"/>
  <meta name="description" content="Options Selling Signal Dashboard — Covered Calls & Cash Secured Puts"/>
  <link rel="manifest" href="manifest.json"/>
  <title>Options Selling Dashboard</title>

  <!-- Inline SVG favicon -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%230d0d0f'/%3E%3Crect x='1' y='1' width='30' height='30' rx='7' fill='none' stroke='%2300e87a' stroke-width='1.5'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='monospace' font-weight='700' font-size='14' fill='%2300e87a'%3EOD%3C/text%3E%3C/svg%3E"/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0f;
      --surface-1:  #141416;
      --surface-2:  #1c1c1f;
      --surface-3:  #242428;
      --border-1:   rgba(255,255,255,0.06);
      --border-2:   rgba(255,255,255,0.10);
      --border-3:   rgba(255,255,255,0.18);
      --text-1:     #f0f0f2;
      --text-2:     #9898a0;
      --text-3:     #52525a;
      --text-4:     #35353d;
      --green:      #00e87a;
      --green-s:    rgba(0,232,122,0.10);
      --green-e:    rgba(0,232,122,0.22);
      --green-g:    rgba(0,232,122,0.35);
      --amber:      #f5a623;
      --amber-s:    rgba(245,166,35,0.10);
      --amber-e:    rgba(245,166,35,0.22);
      --red:        #ff4f6a;
      --red-s:      rgba(255,79,106,0.10);
      --red-e:      rgba(255,79,106,0.22);
      --blue:       #4da3ff;
      --blue-s:     rgba(77,163,255,0.10);
      --blue-e:     rgba(77,163,255,0.22);
      --purple:     #a78bfa;
      --purple-s:   rgba(167,139,250,0.10);
      --purple-e:   rgba(167,139,250,0.22);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', -apple-system, sans-serif;
      --safe-top:    env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --r-sm: 8px; --r-md: 12px; --r-lg: 16px;
      --sh1: 0 1px 3px rgba(0,0,0,0.4),0 1px 2px rgba(0,0,0,0.3);
      --sh2: 0 4px 12px rgba(0,0,0,0.5),0 2px 4px rgba(0,0,0,0.3);
      --sh3: 0 8px 24px rgba(0,0,0,0.6),0 4px 8px rgba(0,0,0,0.4);
    }

    html { height:100%; -webkit-text-size-adjust:100%; text-rendering:optimizeLegibility; -webkit-font-smoothing:antialiased; }
    body { height:100%; background:var(--bg); color:var(--text-1); font-family:var(--sans); overflow:hidden; line-height:1.5; }

    ::-webkit-scrollbar { width:3px; height:3px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--surface-3); border-radius:4px; }

    #app { display:flex; flex-direction:column; height:100dvh; padding-top:var(--safe-top); }

    /* ── HEADER ── */
    .header {
      background:rgba(13,13,15,0.96);
      backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);
      border-bottom:1px solid var(--border-1);
      padding:10px 14px 0;
      flex-shrink:0;
      z-index:100;
      /* Prevent header from growing beyond what it needs */
      min-width:0;
    }

    .header-top {
      display:flex; justify-content:space-between; align-items:flex-start;
      gap:8px; margin-bottom:10px; min-width:0;
    }

    .logo-block { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; }
    .logo-title { font-family:var(--mono); font-size:13px; font-weight:700; color:var(--text-1); letter-spacing:0.02em; line-height:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .clock-row { display:flex; align-items:center; gap:8px; margin-top:2px; }
    .live-clock { font-family:var(--mono); font-size:9px; color:var(--text-3); letter-spacing:0.04em; white-space:nowrap; }

    /* ── TICKER SELECTOR ── */
    .ticker-selector {
      display:flex; flex-direction:column; gap:8px; margin-bottom:10px;
      padding:9px 12px;
      background:var(--surface-1);
      border:1px solid var(--border-1);
      border-radius:var(--r-md);
    }

    .ticker-sel-top { display:flex; justify-content:space-between; align-items:center; }
    .ticker-selector-label { font-size:9px; font-weight:700; color:var(--text-3); letter-spacing:0.14em; text-transform:uppercase; }
    .ticker-sel-controls { display:flex; align-items:center; gap:8px; }

    .ticker-count { font-size:9px; color:var(--text-4); font-family:var(--mono); }

    .ticker-mode-btn {
      padding:3px 8px; border-radius:10px;
      font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.06em;
      background:transparent; border:1px solid var(--border-1); color:var(--text-3);
      cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent;
    }
    .ticker-mode-btn.active { background:var(--green-s); border-color:var(--green-e); color:var(--green); }

    .ticker-clear-btn {
      padding:3px 8px; border-radius:10px;
      font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.06em;
      background:transparent; border:1px solid rgba(255,79,106,0.2); color:rgba(255,79,106,0.5);
      cursor:pointer; transition:all 0.15s; -webkit-tap-highlight-color:transparent;
    }
    .ticker-clear-btn:hover { color:var(--red); border-color:var(--red-e); }

    .ticker-chips { display:flex; flex-wrap:wrap; gap:5px; }

    .ticker-chip {
      padding:5px 11px;
      border-radius:20px;
      border:1px solid var(--border-1);
      background:transparent;
      color:var(--text-3);
      font-family:var(--mono);
      font-size:11px;
      font-weight:700;
      cursor:pointer;
      transition:all 0.12s;
      -webkit-tap-highlight-color:transparent;
      letter-spacing:0.04em;
      touch-action:manipulation;
    }

    .ticker-chip:hover { border-color:var(--border-2); color:var(--text-2); }
    .ticker-chip.selected { background:var(--green-s); border-color:var(--green-e); color:var(--green); }
    .ticker-chip.maxed { opacity:0.3; cursor:not-allowed; }

    /* ── RUN BUTTON + MARKET STATUS ── */
    .header-actions {
      display:flex; flex-direction:column; align-items:flex-end;
      gap:4px; flex-shrink:0;
    }

    .header-actions-row { display:flex; align-items:center; gap:7px; }

    .market-pill {
      padding:3px 8px;
      border-radius:20px;
      font-family:var(--mono);
      font-size:9px;
      font-weight:700;
      letter-spacing:0.06em;
      flex-shrink:0;
      white-space:nowrap;
    }

    .market-pill.open { background:var(--green-s); border:1px solid var(--green-e); color:var(--green); }
    .market-pill.closed { background:var(--surface-2); border:1px solid var(--border-1); color:var(--text-3); }
    .market-pill.ah { background:var(--purple-s); border:1px solid var(--purple-e); color:var(--purple); }

    .run-btn {
      padding:8px 13px;
      background:var(--green-s);
      border:1px solid var(--green-e);
      border-radius:var(--r-sm);
      color:var(--green);
      font-family:var(--mono);
      font-size:11px;
      font-weight:700;
      letter-spacing:0.06em;
      cursor:pointer;
      display:flex; align-items:center; gap:6px;
      transition:background 0.15s,border-color 0.15s,transform 0.1s;
      -webkit-tap-highlight-color:transparent;
      white-space:nowrap;
      flex-shrink:0;
      touch-action:manipulation;
    }

    .run-btn.ah-mode { background:var(--purple-s); border-color:var(--purple-e); color:var(--purple); }
    .run-btn:hover:not(.loading) { background:rgba(0,232,122,0.16); border-color:var(--green-g); }
    .run-btn.ah-mode:hover:not(.loading) { background:var(--purple-s); border-color:var(--purple); }
    .run-btn:active:not(.loading) { transform:scale(0.96); }
    .run-btn.loading { color:var(--text-3); border-color:var(--border-1); background:var(--surface-1); cursor:default; }

    .pulse-dot {
      width:6px; height:6px; border-radius:50%; background:var(--green);
      box-shadow:0 0 0 0 var(--green-g);
      animation:sonar 2s ease-out infinite; flex-shrink:0;
    }

    .next-check {
      font-family:var(--mono); font-size:9px; color:var(--text-4);
      letter-spacing:0.04em; white-space:nowrap;
    }

    /* ── NOTIFICATION TRADE ROW ── */
    .notif-trade-row { display:flex; flex-wrap:wrap; gap:5px; margin-top:5px; }
    .notif-trade-chip {
      padding:2px 8px; border-radius:8px;
      background:var(--surface-3); border:1px solid var(--border-1);
      font-family:var(--mono); font-size:10px; font-weight:700; color:var(--text-2);
      display:flex; align-items:center; gap:4px;
    }

    /* ── TABS ── */
    .tabs { display:flex; overflow-x:auto; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }

    .tab-btn {
      padding:9px 16px;
      background:none; border:none; border-bottom:2px solid transparent;
      color:var(--text-3); font-family:var(--sans); font-size:12px; font-weight:600;
      cursor:pointer; letter-spacing:0.04em; white-space:nowrap;
      transition:color 0.15s,border-color 0.15s;
      -webkit-tap-highlight-color:transparent;
      position:relative;
    }
    .tab-btn:hover { color:var(--text-2); }
    .tab-btn.active { color:var(--text-1); border-bottom-color:var(--green); }

    .tab-badge {
      position:absolute; top:6px; right:6px;
      background:var(--red); color:#fff;
      font-size:8px; font-weight:700; font-family:var(--mono);
      min-width:14px; height:14px;
      border-radius:7px; padding:0 3px;
      display:flex; align-items:center; justify-content:center;
      line-height:1;
    }

    /* ── CONTENT ── */
    .content {
      flex:1; overflow-y:auto; overflow-x:hidden;
      -webkit-overflow-scrolling:touch; overscroll-behavior:contain;
      padding:16px 18px;
      padding-bottom:calc(16px + var(--safe-bottom));
    }

    @media (min-width:700px) {
      .header { padding:14px 28px 0; }
      .logo-title { font-size:15px; }
      .content { padding:22px 28px; max-width:920px; margin:0 auto; width:100%; }
    }

    /* ── SIGNAL CARDS ── */
    .signal-card {
      background:var(--surface-1);
      border:1px solid var(--border-1);
      border-radius:var(--r-lg);
      padding:16px;
      margin-bottom:12px;
      box-shadow:var(--sh1);
      animation:fadeUp 0.28s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    .signal-card-header {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:14px;
    }

    .signal-card-ticker { font-family:var(--mono); font-size:16px; font-weight:700; color:var(--text-1); }
    .signal-card-name { font-size:10px; color:var(--text-3); margin-top:2px; }

    .strategy-tag {
      padding:3px 9px;
      border-radius:20px;
      font-family:var(--mono);
      font-size:9px;
      font-weight:700;
      letter-spacing:0.08em;
    }

    .strategy-tag.cc { background:var(--green-s); border:1px solid var(--green-e); color:var(--green); }
    .strategy-tag.csp { background:var(--blue-s); border:1px solid var(--blue-e); color:var(--blue); }

    .tickers-row {
      display:grid; grid-template-columns:repeat(4,1fr);
      gap:8px; margin-bottom:12px;
    }

    @media (max-width:500px) { .tickers-row { grid-template-columns:1fr 1fr; } }

    .metric-cell { }
    .metric-label { font-size:9px; font-weight:700; color:var(--text-3); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:4px; }
    .metric-value { font-family:var(--mono); font-size:18px; font-weight:700; line-height:1; letter-spacing:-0.01em; }
    .metric-sub { font-size:10px; color:var(--text-3); margin-top:3px; font-family:var(--mono); }

    .signal-badge {
      display:flex; align-items:center; gap:10px;
      padding:13px 15px; border-radius:var(--r-md);
      margin-bottom:12px;
    }

    .signal-badge-text { display:flex; flex-direction:column; gap:2px; }
    .signal-badge-label { font-family:var(--mono); font-size:13px; font-weight:700; letter-spacing:0.04em; line-height:1; }
    .signal-badge-sub { font-family:var(--mono); font-size:9px; opacity:0.55; letter-spacing:0.08em; }

    .reasoning-block {
      background:var(--surface-2);
      border-radius:var(--r-sm);
      padding:12px 14px;
      font-size:13px; color:var(--text-2); line-height:1.72;
      margin-bottom:12px;
    }

    .trade-setup {
      background:var(--surface-2);
      border:1px solid var(--green-e);
      border-radius:var(--r-md);
      padding:14px;
      margin-bottom:12px;
    }

    .trade-setup.csp-setup { border-color:var(--blue-e); }

    .trade-setup-label {
      font-size:9px; font-weight:700; letter-spacing:0.14em;
      text-transform:uppercase; margin-bottom:12px;
    }

    .trade-setup-label.cc { color:rgba(0,232,122,0.7); }
    .trade-setup-label.csp { color:rgba(77,163,255,0.7); }

    .trade-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }

    .trade-item-label { font-size:9px; font-weight:700; color:var(--text-3); letter-spacing:0.12em; text-transform:uppercase; margin-bottom:3px; }
    .trade-item-value { font-family:var(--mono); font-size:14px; font-weight:700; letter-spacing:-0.01em; }

    .basis-note {
      grid-column:1/-1; margin-top:4px;
      padding:9px 11px;
      border-radius:var(--r-sm);
      font-size:11px; line-height:1.5;
    }

    .basis-note.cc { background:rgba(0,232,122,0.06); color:rgba(0,232,122,0.75); }
    .basis-note.csp { background:rgba(77,163,255,0.06); color:rgba(77,163,255,0.75); }

    .info-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }

    .info-card {
      padding:11px 13px;
      border-radius:var(--r-md);
      border:1px solid;
      box-shadow:var(--sh1);
    }

    .info-card-label { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; margin-bottom:5px; }
    .info-card-body { font-size:11px; color:var(--text-2); line-height:1.65; }

    .card-timestamp { font-family:var(--mono); font-size:10px; color:var(--text-4); text-align:right; margin-top:6px; }

    /* ── AH CARD ── */
    .ah-card {
      background:var(--surface-1);
      border:1px solid var(--purple-e);
      border-radius:var(--r-lg);
      padding:16px;
      margin-bottom:12px;
      animation:fadeUp 0.28s cubic-bezier(0.4,0,0.2,1) forwards;
    }

    .ah-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .ah-badge { padding:3px 10px; border-radius:20px; background:var(--purple-s); border:1px solid var(--purple-e); color:var(--purple); font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:0.08em; }
    .ah-ticker { font-family:var(--mono); font-size:16px; font-weight:700; }

    .ah-section { margin-bottom:14px; }
    .ah-section-title { font-size:9px; font-weight:700; color:var(--text-3); letter-spacing:0.14em; text-transform:uppercase; margin-bottom:8px; }
    .ah-section-body { font-size:13px; color:var(--text-2); line-height:1.72; }

    .missed-signals { display:flex; flex-direction:column; gap:6px; }

    .missed-signal-row {
      display:flex; align-items:center; gap:10px;
      padding:9px 12px;
      background:var(--surface-2);
      border-radius:var(--r-sm);
    }

    .missed-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .missed-label { font-family:var(--mono); font-size:11px; font-weight:700; flex:1; }
    .missed-time { font-family:var(--mono); font-size:10px; color:var(--text-3); }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; padding:64px 24px; gap:14px; text-align:center;
    }

    .empty-icon { font-size:40px; line-height:1; }
    .empty-title { font-size:15px; font-weight:600; color:var(--text-3); }
    .empty-sub { font-size:12px; color:var(--text-4); line-height:1.6; max-width:260px; }

    .loading-wrap {
      display:flex; flex-direction:column; align-items:center;
      gap:18px; padding:64px 20px;
    }

    .loading-ticker { font-family:var(--mono); font-size:12px; color:var(--green); letter-spacing:0.1em; animation:blink 1s infinite; }

    .loading-bars { display:flex; gap:5px; align-items:flex-end; height:32px; }
    .loading-bar { width:4px; border-radius:2px; background:var(--green); opacity:0.5; }
    .loading-bar:nth-child(1){height:16px;animation:bar 1s ease-in-out infinite 0.00s}
    .loading-bar:nth-child(2){height:28px;animation:bar 1s ease-in-out infinite 0.12s}
    .loading-bar:nth-child(3){height:20px;animation:bar 1s ease-in-out infinite 0.24s}
    .loading-bar:nth-child(4){height:32px;animation:bar 1s ease-in-out infinite 0.36s}
    .loading-bar:nth-child(5){height:14px;animation:bar 1s ease-in-out infinite 0.48s}

    /* ── LEARN TAB ── */
    .learn-tracks { display:flex; gap:6px; margin-bottom:16px; }

    .track-btn {
      flex:1; padding:10px 14px;
      border-radius:var(--r-md);
      border:1px solid var(--border-1);
      background:transparent;
      font-size:12px; font-weight:700;
      cursor:pointer; text-align:center;
      transition:all 0.15s;
      -webkit-tap-highlight-color:transparent;
      display:flex; flex-direction:column; align-items:center; gap:3px;
    }

    .track-btn.cc.active { background:var(--green-s); border-color:var(--green-e); color:var(--green); }
    .track-btn.csp.active { background:var(--blue-s); border-color:var(--blue-e); color:var(--blue); }
    .track-btn:not(.active) { color:var(--text-3); }

    .track-btn-icon { font-size:20px; }
    .track-btn-label { font-family:var(--mono); font-size:10px; letter-spacing:0.06em; }
    .track-btn-sub { font-size:9px; opacity:0.6; font-family:var(--sans); }

    .course-nav { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:16px; }

    .course-nav-btn {
      padding:6px 12px; border-radius:20px;
      border:1px solid var(--border-1); background:transparent;
      color:var(--text-3); font-size:11px; font-weight:600;
      cursor:pointer; display:flex; align-items:center; gap:5px;
      font-family:var(--sans); transition:all 0.15s;
      -webkit-tap-highlight-color:transparent;
    }

    .course-nav-btn:hover { color:var(--text-2); border-color:var(--border-2); }

    .course-nav-btn.active-cc { background:var(--green-s); border-color:var(--green-e); color:var(--green); }
    .course-nav-btn.active-csp { background:var(--blue-s); border-color:var(--blue-e); color:var(--blue); }

    .course-title { font-size:17px; font-weight:700; color:var(--text-1); margin-bottom:14px; letter-spacing:-0.01em; }

    .accordion-item {
      background:var(--surface-1);
      border:1px solid var(--border-1);
      border-radius:var(--r-md); margin-bottom:6px;
      overflow:hidden; box-shadow:var(--sh1);
      transition:border-color 0.15s;
    }

    .accordion-item:hover { border-color:var(--border-2); }
    .accordion-item.open { border-color:var(--border-2); }

    .accordion-hdr {
      padding:14px 16px;
      display:flex; justify-content:space-between; align-items:center;
      cursor:pointer; background:transparent; border:none; width:100%;
      text-align:left; -webkit-tap-highlight-color:transparent; gap:12px;
      transition:background 0.15s;
    }

    .accordion-hdr.open { background:var(--surface-2); }

    .accordion-heading { font-size:13px; font-weight:600; color:var(--text-1); flex:1; line-height:1.4; }

    .accordion-chevron {
      color:var(--text-3); font-size:10px; flex-shrink:0;
      transition:transform 0.22s cubic-bezier(0.4,0,0.2,1); line-height:1;
    }

    .accordion-chevron.open { transform:rotate(180deg); color:var(--text-2); }

    .accordion-body {
      padding:13px 16px 15px;
      border-top:1px solid var(--border-1);
      font-size:13px; color:var(--text-2);
      line-height:1.78; white-space:pre-wrap;
      word-break:break-word; background:var(--surface-1);
    }

    /* ── NOTIFICATIONS TAB ── */
    .notif-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }

    .notif-count-label { font-size:10px; font-weight:700; color:var(--text-3); letter-spacing:0.14em; text-transform:uppercase; }

    .clear-btn {
      font-size:10px; color:rgba(255,79,106,0.35); background:none; border:none;
      cursor:pointer; font-family:var(--mono); letter-spacing:0.06em; padding:4px 0;
      transition:color 0.15s; -webkit-tap-highlight-color:transparent;
    }
    .clear-btn:hover { color:var(--red); }

    .notif-entry {
      display:flex; align-items:center; gap:12px;
      padding:12px 15px;
      background:var(--surface-1);
      border:1px solid var(--border-1);
      border-radius:var(--r-md); margin-bottom:6px;
      box-shadow:var(--sh1); transition:border-color 0.15s;
      position:relative;
    }

    .notif-entry:hover { border-color:var(--border-2); }
    .notif-entry.unread { border-color:var(--border-2); }

    .notif-unread-dot {
      position:absolute; top:10px; right:10px;
      width:6px; height:6px; border-radius:50%;
      background:var(--red);
    }

    .notif-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .notif-mid { flex:1; min-width:0; }

    .notif-top { display:flex; align-items:center; gap:7px; }
    .notif-ticker { font-family:var(--mono); font-size:13px; font-weight:700; }
    .notif-strategy-tag { padding:2px 7px; border-radius:10px; font-family:var(--mono); font-size:8px; font-weight:700; letter-spacing:0.06em; }
    .notif-signal-label { font-family:var(--mono); font-size:11px; font-weight:700; }

    .notif-reasoning { font-size:11px; color:var(--text-3); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .notif-time { font-family:var(--mono); font-size:10px; color:var(--text-4); white-space:nowrap; flex-shrink:0; }

    /* ── TOAST NOTIFICATION ── */
    .toast {
      position:fixed;
      top:max(calc(var(--safe-top) + 10px),12px);
      right:14px; left:auto;
      padding:12px 15px;
      border-radius:var(--r-md); border:1px solid;
      display:flex; align-items:center; gap:10px;
      z-index:999;
      backdrop-filter:blur(24px) saturate(200%);
      -webkit-backdrop-filter:blur(24px) saturate(200%);
      box-shadow:var(--sh3);
      transform:translateX(calc(100% + 24px));
      transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events:none;
      min-width:280px; max-width:340px;
    }

    @media (max-width:420px) { .toast { left:14px; right:14px; min-width:unset; transform:translateY(calc(-100% - 24px)); } }
    @media (max-width:420px) { .toast.show { transform:translateY(0); } }
    .toast.show { transform:translateX(0); }

    .toast-icon { font-size:16px; flex-shrink:0; }
    .toast-body { flex:1; min-width:0; }
    .toast-title { font-size:12px; font-weight:700; line-height:1; }
    .toast-sub { font-size:10px; opacity:0.65; margin-top:3px; font-family:var(--mono); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* ── ERROR ── */
    .error-card { padding:13px 15px; background:var(--red-s); border:1px solid var(--red-e); border-radius:var(--r-md); font-size:12px; font-family:var(--mono); color:var(--red); line-height:1.65; }

    /* ── FOOTER ── */
    .footer { text-align:center; padding:5px 18px 4px; border-top:1px solid var(--border-1); flex-shrink:0; padding-bottom:max(5px,var(--safe-bottom)); }
    .footer-text { font-family:var(--mono); font-size:9px; color:var(--text-4); letter-spacing:0.08em; }

    /* ── ANIMATIONS ── */
    @keyframes sonar { 0%{box-shadow:0 0 0 0 var(--green-g)} 70%{box-shadow:0 0 0 7px rgba(0,232,122,0)} 100%{box-shadow:0 0 0 0 rgba(0,232,122,0)} }
    @keyframes blink { 0%,100%{opacity:0.9} 50%{opacity:0.2} }
    @keyframes bar { 0%,100%{transform:scaleY(0.4);opacity:0.3} 50%{transform:scaleY(1);opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  </style>

<script type="module">

// ─── CRASH COURSE DATA ────────────────────────────────────────────────────────
const LEARN = {
  cc: [
    {
      id:'basics', title:'What Is a Covered Call?', icon:'📘',
      content:[
        { h:'The Core Idea', b:'A covered call means you sell someone else the RIGHT to buy your shares at a set price (the strike) by a set date (expiration) — in exchange for cash upfront (the premium). You must own at least 100 shares per contract sold.\n\nBest for: Investors who own stock and want to generate income while holding, accepting a cap on upside in exchange for guaranteed premium.' },
        { h:'Your P&L Scenarios', b:'• Stock stays below strike → You keep premium + your shares. Rinse and repeat.\n• Stock rises above strike → Shares get "called away" at the strike. You keep premium but miss gains above it.\n• Stock falls → Premium partially offsets your loss. You still own shares.\n\nKey insight: You\'re trading away upside potential above the strike in exchange for guaranteed income today.' },
        { h:'Why Sell Covered Calls?', b:'1. Income generation on flat or mildly bullish positions\n2. Lower your effective cost basis over time\n3. Get paid to wait while a stock recovers\n4. Outperform a buy-and-hold in sideways or slightly down markets\n\nNot ideal when: You expect a major near-term breakout — you\'ll cap your gains at the strike.' },
        { h:'Real Example', b:'You own 100 shares of XYZ at $50. You sell the $55 call expiring in 30 days for $1.50 premium.\n\n• If XYZ stays below $55 → You keep $150. Effective cost now $48.50.\n• If XYZ closes at $58 at expiry → You sell at $55. Total gain = ($55-$50) + $1.50 = $6.50/share. You miss $3.\n• If XYZ drops to $45 → You lose $5/share but premium reduces it to -$3.50.' },
      ]
    },
    {
      id:'greeks', title:'The Greeks You Need', icon:'🔢',
      content:[
        { h:'Delta (Δ) — Strike Probability', b:'Delta ≈ probability the option expires in-the-money (ITM). A 0.30 delta call has roughly 30% chance of being exercised.\n\nFor covered calls: Target 0.15–0.35 delta.\n• 0.15–0.20: Conservative — low assignment risk, lower premium\n• 0.25–0.35: Balanced — meaningful premium, moderate risk\n• >0.40: Aggressive — high premium but high assignment probability' },
        { h:'Theta (Θ) — Time Decay Is Your Edge', b:'Theta = dollars the option loses per day from time alone.\n\nAs a SELLER, theta works FOR you. Every day that passes, the option you sold is worth less — even if price doesn\'t move.\n\nTheta accelerates sharply in the final 2 weeks before expiration. This is why targeting 21–45 DTE (days to expiration) is optimal — you capture fast-decaying premium while managing risk.' },
        { h:'Vega (V) — IV Is Your Paycheck', b:'Vega measures how much the option price changes per 1% move in Implied Volatility (IV).\n\nAs a seller, you WANT high IV when entering. High IV = expensive options = bigger premium collected. IV then typically "mean reverts" (falls back to normal) after events, which profits you twice — time decay AND IV crush.\n\nKey principle: SELL options when IV is high. BUY options when IV is low.' },
        { h:'IV Rank — Knowing When IV Is "High"', b:'IV Rank tells you where current IV sits within its 52-week range.\n\n• 0% = cheapest IV has been in a year\n• 100% = most expensive IV has been in a year\n\nTarget: IV Rank > 40 before selling covered calls.\nAvoid: IV Rank < 20 — premiums are thin, not worth the risk.\n\nIV Rank is your most important entry signal. Everything else comes second.' },
        { h:'Gamma (Γ) — The Risk Accelerator', b:'Gamma measures how fast delta changes as price moves. High gamma = delta changing rapidly.\n\nGamma risk is highest close to expiration and when price is near the strike. This is why you don\'t want to hold short options through earnings or major events — a sudden move will cause gamma to spike and can quickly move your option deep ITM.' },
      ]
    },
    {
      id:'strategy', title:'Covered Call Playbook', icon:'⚡',
      content:[
        { h:'Strike Selection: The Core Rule', b:'Always target strikes ABOVE your cost basis when possible. This ensures if assigned, you profit on both the shares AND the premium.\n\nFramework by market outlook:\n• Neutral/slightly bearish: Sell closer to ATM (0.30–0.40 delta) for more premium\n• Mildly bullish: Sell further OTM (0.20–0.25 delta) to allow more upside\n• Very bullish: Consider skipping this month or selling very far OTM (0.10–0.15 delta)' },
        { h:'The 21–45 DTE Sweet Spot', b:'21–45 days to expiration is optimal for most traders:\n\n• <14 DTE: Theta is fast but so is gamma risk. Volatile stocks can blow past strikes quickly.\n• 21–45 DTE: Best theta-to-risk ratio. Enough time for price to stay range-bound, enough premium to be worth it.\n• >60 DTE: Large premiums but slow theta. More time = more things that can go wrong.\n\nMany professionals sell at 45 DTE and target closing at 21 DTE (half the time elapsed).' },
        { h:'The 50% Profit Rule', b:'When your short call has lost 50% of its value (you sold for $2.00, now worth $1.00) → BUY IT BACK and close the trade.\n\nWhy? You\'ve captured most of the theoretical max gain in half the time. Holding for the final 50% exposes you to full gamma risk for diminishing returns.\n\nExample: Sell a call for $2.00. At $1.00, close it. Net profit: $1.00/share ($100/contract). Now sell a new position and start the clock again.' },
        { h:'Rolling: Extending Your Position', b:'If your stock approaches your strike before expiration, you have options:\n\n• Roll out: Buy back, sell same strike further in time. Collects more credit or net even.\n• Roll up and out: Buy back, sell higher strike further in time. Costs a debit but keeps more upside.\n• Take assignment: If strike > cost basis, assignment is a profitable outcome — accept it.\n\nNEVER roll down (to a lower strike) to avoid assignment on a rising stock. You\'re just locking in less profit.' },
        { h:'How Many Contracts to Sell', b:'Recommendation: Never sell contracts against 100% of your shares on a stock you believe in long-term.\n\nSuggested approach:\n• Own 300 shares → Sell 1–2 contracts, keep 1 "naked" (unhedged)\n• Own 100 shares → Consider skipping until you have a strong sideways view\n• Own 500+ shares → Sell up to 60–70% of your shares worth of contracts\n\nKeeping some shares unhedged means a big move upward still benefits you meaningfully.' },
      ]
    },
    {
      id:'timing', title:'When to Sell', icon:'🎯',
      content:[
        { h:'Sell Into Strength', b:'Execute covered calls on GREEN days when the stock is up. A rising stock gives you:\n1. A higher underlying price → higher premium for the same strike\n2. Elevated same-day IV → more expensive options\n3. Better "buffer" before the stock rises above your strike\n\nSelling on down days means cheap premiums and you\'re selling from a position of weakness.' },
        { h:'Post-Earnings IV Crush Opportunity', b:'After earnings, IV collapses dramatically (this is called "IV crush"). This means:\n\n• Right BEFORE earnings: IV is sky-high — don\'t sell if you might want to hold through the move\n• Right AFTER earnings: IV deflates — the premium window has closed\n• 2–4 weeks before earnings: Often the sweet spot — IV is rising but the event hasn\'t happened yet\n\nStrategy: Sell a covered call 3–4 weeks before earnings, close before the earnings date.' },
        { h:'Market Conditions That Favor Selling', b:'IDEAL conditions to sell covered calls:\n✓ IV Rank > 40 on the underlying\n✓ VIX elevated (market fear = expensive options everywhere)\n✓ Stock has had a recent up day or up week\n✓ Clear resistance level above where you\'re selling\n✓ No major catalyst (earnings, FDA, FOMC) in the next 2–3 weeks\n\nAVOID selling when:\n✗ IV Rank < 20 (premiums too thin)\n✗ Earnings within 2 weeks\n✗ Strong uptrend with momentum — you\'ll cap a big winner' },
        { h:'The 3 Optimal Check Times', b:'Check conditions three times daily:\n\n9:30 AM ET — Market Open\nOvernight news may have spiked IV. Gap-up opens often offer elevated premiums. Check if the stock opened strong.\n\n12:30 PM ET — Midday\nIntraday trend is clearer. If the stock is green and IV holding, good conditions to enter. Gamma risk is reduced at midday.\n\n3:50 PM ET — Pre-Close\nLast opportunity for the day. Also the time to close positions at 50%+ profit to free up capital overnight.' },
      ]
    },
    {
      id:'mistakes', title:'Mistakes to Avoid', icon:'🚨',
      content:[
        { h:'Selling Below Cost Basis', b:'If your avg cost is $46 and you sell a $44 call, you\'re setting yourself up for a guaranteed loss if assigned. The premium would need to be enormous to justify this.\n\nOnly sell below cost basis if:\n1. The premium is so large it actually brings your cost below the strike\n2. You intend to close before expiration, not get assigned\n\nIn most cases: wait for the stock to recover before selling near-money calls.' },
        { h:'Holding Through Earnings', b:'This is the #1 beginner mistake. Holding a short call through earnings means:\n• If stock gaps UP 20% → You sell at your strike and miss the entire move\n• If stock gaps DOWN 20% → You keep the premium but the shares lose far more\n\nAlways close or roll short calls 5–7 days before earnings, or don\'t sell them in the first place if earnings are <3 weeks away.' },
        { h:'Chasing Premium in Low IV', b:'Selling a 0.8% premium call for 30 days isn\'t worth the risk. Low IV premiums:\n• Don\'t compensate for the possibility of upside you\'re capping\n• Leave you with tiny income that doesn\'t meaningfully offset downside\n• Often indicate the market expects a move — and it\'s a move you don\'t want to miss\n\nIf IV Rank is below 20, step aside and wait.' },
        { h:'Rolling Down on a Winner', b:'If your stock has risen toward your strike, your first instinct might be to roll down to a lower strike to collect more premium. Don\'t.\n\nRolling down means you\'re now committed to selling at a LOWER price. If the stock continues rising, you\'ve locked in an even worse outcome.\n\nThe right move: Roll up and out (higher strike, later date) or take the assignment and be happy with the profit.' },
        { h:'Over-Hedging Your Position', b:'Selling calls on 100% of your shares turns a growth investment into an income instrument. If you own a high-conviction growth stock, you\'re capping the very reason you own it.\n\nRule of thumb: On your highest-conviction positions, sell calls on no more than 50–60% of your shares. On index ETFs (SPY, QQQ), 80–100% is fine since the upside is more predictable.' },
      ]
    },
  ],
  csp: [
    {
      id:'csp-basics', title:'What Is a Cash Secured Put?', icon:'💵',
      content:[
        { h:'The Core Idea', b:'A Cash Secured Put (CSP) means you sell someone the RIGHT to sell their shares to YOU at a set price (the strike) by expiration — in exchange for premium. You hold cash equal to (strike × 100) as collateral.\n\nYou\'re essentially saying: "I\'m willing to buy this stock at [strike price]. Pay me to wait."\n\nBest for: Getting paid to enter a stock position at a price you\'d be happy owning, or generating income on cash sitting idle.' },
        { h:'Your P&L Scenarios', b:'• Stock stays above strike → You keep the premium. Your cash is returned. Repeat.\n• Stock falls below strike → You\'re assigned. You buy 100 shares at the strike price, but your actual cost basis is strike minus premium received.\n• Stock crashes far below strike → You own shares at a loss. Premium only partially cushions the fall.\n\nKey insight: Your maximum gain is capped at the premium. Your maximum loss is the full cost of the shares minus premium.' },
        { h:'CSP vs Covered Call: The Relationship', b:'These two strategies are closely related — they\'re called "synthetically equivalent" in options theory.\n\nSelling a CSP is nearly identical to:\n1. Buying the stock outright\n2. Immediately selling a covered call on it\n\nBoth strategies profit when the stock stays flat or rises modestly. Both lose when the stock falls significantly. The practical difference: you don\'t own shares yet with a CSP — you\'re waiting to be assigned.' },
        { h:'Capital Requirements', b:'Unlike covered calls (which require owning shares), CSPs require CASH collateral.\n\nExample: Selling a $45 strike put requires $4,500 in cash to be held as collateral per contract.\n\nThis cash earns you nothing while tied up (unless your broker pays interest on margin). Factor this "opportunity cost" into your yield calculations.\n\nIn a Roth IRA: CSPs are fully permitted as "cash secured." In a margin account: you may be able to use portfolio margin to reduce collateral requirements.' },
      ]
    },
    {
      id:'csp-greeks', title:'Greeks for Put Selling', icon:'📐',
      content:[
        { h:'Delta for CSPs: Think in Probabilities', b:'When selling puts, delta works the same way but in reverse:\n\n• -0.30 delta put = roughly 30% chance of expiring ITM (getting assigned)\n• -0.20 delta put = 80% chance of expiring worthless (you keep premium)\n\nFor CSPs, target -0.20 to -0.35 delta:\n• -0.15 to -0.20: Conservative, low premium, high probability of keeping it\n• -0.25 to -0.35: Balanced — meaningful premium, reasonable assignment risk\n• >-0.40: Aggressive — high premium but significant chance of buying shares' },
        { h:'Theta: Still Your Best Friend', b:'Just like covered calls, theta works entirely in your favor as a put seller.\n\nEvery day that passes erodes the put value — even if the stock doesn\'t move. The 21–45 DTE window applies equally to CSPs.\n\nPractical example: You sell a 30-DTE put for $2.00. After 15 days with no significant price move, the put may be worth $0.90 — not because of price change, but purely from theta decay. Close it for a $1.10 profit.' },
        { h:'Vega: IV Rank Is Still King', b:'Same principle as covered calls: sell puts when IV is HIGH, not low.\n\nWhen IV spikes (market selloffs, fear events, pre-earnings), put premiums inflate enormously. This is when:\n1. Everyone is buying puts for protection (driving up IV)\n2. You collect that "fear premium" by selling\n3. When fear subsides and IV normalizes, your puts deflate quickly\n\nVIX spikes are CSP opportunities. A VIX reading of 25+ often means juicy put premiums across the board.' },
        { h:'Skew: Puts Are Usually More Expensive', b:'Options have "volatility skew" — puts are almost always more expensive than equivalent calls (same distance from current price).\n\nWhy? Institutional investors constantly buy puts for portfolio protection, driving up their price.\n\nFor CSP sellers, this is an advantage: you collect a higher premium selling puts than you would selling an equivalent call on the same stock, at the same distance from current price. This is why many professional income traders prefer selling puts to selling calls.' },
      ]
    },
    {
      id:'csp-strategy', title:'CSP Strategy Playbook', icon:'🎯',
      content:[
        { h:'Strike Selection: "Happy to Own" Rule', b:'Only sell puts at strikes where you\'d GENUINELY be happy buying the stock.\n\nThis is the golden rule of CSPs. If you get assigned, you own the shares. If that thought makes you uncomfortable at that price — don\'t sell the put.\n\nFramework:\n• Identify your "ideal entry" price for the stock\n• Sell the put at or just below that price\n• Collect premium while waiting for the price to come to you\n\nExample: NVDA at $850. You\'d love to own it at $800. Sell the $800 put for $12.00 premium.' },
        { h:'The Wheel Strategy', b:'The Wheel is the most popular strategy combining CSPs and covered calls:\n\nStep 1: Sell a CSP at your target entry price\n→ Either: Collect premium and expire worthless (sell another CSP)\n→ Or: Get assigned and buy shares\n\nStep 2: Once assigned, immediately sell a covered call at or above your cost basis\n→ Either: Collect premium and expire worthless (sell another CC)\n→ Or: Get called away at a profit (start over with cash)\n\nYou\'re continuously generating income, getting in and out of positions systematically.' },
        { h:'Position Sizing for CSPs', b:'Your collateral requirement determines how many contracts you can sell.\n\nExample with $50,000 cash:\n• NVDA $800 put: $80,000 required → Can\'t do it on $50k\n• IREN $40 put: $4,000 required → Could sell up to 12 contracts\n• SPY $500 put: $50,000 required → Exactly 1 contract\n\nBest practice: Never commit more than 25–30% of your available cash to a single CSP position. Spread across multiple tickers or strikes. This ensures if you get assigned, you have cash reserves left.' },
        { h:'Managing Untested (Winning) Positions', b:'When a put position is working well (stock staying above strike), follow the same 50% rule:\n\nClose at 50% of max profit.\n\nIf you sold a put for $2.00 and it\'s now worth $1.00, buy it back. You\'ve made $100/contract in half the expected time. Redeploy that collateral into a new position and start collecting again.\n\nDon\'t hold to expiration just to squeeze out the last dollar — it\'s not worth the increased risk from a sudden gap-down.' },
        { h:'Managing Tested (Losing) Positions', b:'If the stock moves below your strike before expiration, you have three choices:\n\n1. Hold and potentially get assigned: Only do this if you genuinely want the shares at that price. Remember: your real cost basis = strike - premium collected.\n\n2. Roll down and out: Buy back the put, sell a lower-strike put further in time. Collects more premium but increases assignment risk.\n\n3. Close the trade: Accept the loss. If the thesis has changed (bad earnings, guidance cut, sector collapse), don\'t fight it — close and move on.' },
      ]
    },
    {
      id:'csp-timing', title:'When to Sell Puts', icon:'📅',
      content:[
        { h:'The Ideal Setup', b:'Best conditions for selling cash secured puts:\n✓ IV Rank > 40 on the underlying\n✓ Stock near support or recent lows (gives a buffer)\n✓ VIX elevated above 20 (market fear = expensive puts)\n✓ No major catalyst within 2 weeks\n✓ Bullish or neutral overall market environment\n✓ Stock has pulled back from recent highs (sell into weakness, unlike CCs)' },
        { h:'Sell Puts Into Weakness (Opposite of CCs)', b:'This is the key difference vs covered calls:\n\n• Covered Calls: Sell into STRENGTH (stock up, IV elevated)\n• Cash Secured Puts: Sell into WEAKNESS (stock down, fear elevated)\n\nWhen a stock has a bad day and drops 5–8%, put premiums spike dramatically. This is often the ideal entry — you\'re collecting elevated fear premium on a name you like, at a price you\'d be happy owning.\n\nCounter-intuitive but extremely effective.' },
        { h:'Earnings Strategy with CSPs', b:'Two approaches for earnings plays:\n\n1. AVOID earnings: Close or roll your CSP 5–7 days before the earnings date. Post-earnings gap-downs can be violent and your put could go deep ITM overnight.\n\n2. SELL the earnings event: For experienced traders, selling puts right before earnings (with high IV) can generate large premiums. The risk: a miss can result in assignment on a sharply lower stock.\n\nFor beginners: always close before earnings. For advanced traders: only play earnings if you\'d genuinely be comfortable owning the stock at the strike price post-earnings.' },
        { h:'VIX as Your CSP Signal', b:'VIX is the market\'s "fear index." When VIX spikes, put premiums across all major stocks and ETFs inflate significantly.\n\nVIX tiers for CSP selling:\n• VIX < 15: Premiums thin. Skip or be very selective.\n• VIX 15–20: Normal range. Standard CSP setups work well.\n• VIX 20–30: Elevated. Excellent CSP conditions — collect fear premium.\n• VIX > 30: Extreme fear. Extraordinary premiums. Best CSP opportunities — but underlying drawdowns are larger too.\n\nWhen VIX spikes to 30+, selling SPY or QQQ puts can generate monthly yields of 3–5%+ on collateral.' },
      ]
    },
    {

// ─── MARKET HOURS ─────────────────────────────────────────────────────────────
function getMarketStatus() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const h = et.getHours(), m = et.getMinutes(), d = et.getDay();
  if (d === 0 || d === 6) return 'closed';
  const mins = h * 60 + m;
  if (mins >= 9 * 60 + 30 && mins < 16 * 60) return 'open';
  if (mins >= 16 * 60 && mins < 20 * 60) return 'ah'; // after-hours
  return 'closed';
}

function getNextScanInfo() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const h = et.getHours(), m = et.getMinutes(), s = et.getSeconds(), d = et.getDay();
  const isWeekday = d >= 1 && d <= 5;
  const totalMins = h * 60 + m;
  const marketOpen = 9 * 60 + 30;
  const marketClose = 16 * 60;
  if (isWeekday && totalMins >= marketOpen && totalMins < marketClose) {
    const secsUntil = (60 - m) * 60 - s;
    const mm = String(Math.floor(secsUntil / 60)).padStart(2, '0');
    const ss = String(secsUntil % 60).padStart(2, '0');
    return { label: `Next scan: ${mm}:${ss}`, scanning: true };
  }
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let daysUntil = 0, targetDay = d;
  for (let i = 1; i <= 7; i++) {
    targetDay = (d + i) % 7;
    if (targetDay >= 1 && targetDay <= 5) { daysUntil = i; break; }
  }
  const target = new Date(now);
  target.setDate(target.getDate() + daysUntil);
  const targetStr = target.toLocaleDateString('en-US', { timeZone: 'America/New_York', year: 'numeric', month: '2-digit', day: '2-digit' });
  const [mo, da, yr] = targetStr.split('/');
  const nextOpenUTC = new Date(`${yr}-${mo}-${da}T14:30:00Z`);
  const diffSecs = Math.max(0, Math.floor((nextOpenUTC - now) / 1000));
  const cdH = Math.floor(diffSecs / 3600);
  const cdM = Math.floor((diffSecs % 3600) / 60);
  const cdS = diffSecs % 60;
  const cdStr = cdH > 0 ? `${cdH}h ${String(cdM).padStart(2,'0')}m` : `${String(cdM).padStart(2,'0')}m ${String(cdS).padStart(2,'0')}s`;
  return { label: `Opens ${days[targetDay]} · ${cdStr}`, scanning: false };
}

function getLocalClockStr() {
  return new Date().toLocaleString(undefined, { weekday:'short', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:true });
}

function getNextCheckLabel() { return getNextScanInfo().label; }

// ─── SIGNAL ENGINE ────────────────────────────────────────────────────────────
async function fetchSignal(ticker, isAfterHours = false) {
  const tickerInfo = TICKERS[ticker] || {};
  const now = new Date().toLocaleString('en-US', { timeZone: 'America/New_York' });

  const basePrompt = isAfterHours
    ? `You are an after-hours options analysis engine. Markets are closed.
    
Ticker: ${ticker} (${tickerInfo.name})
Current time (ET): ${now}

Use web search to find:
1. Today's closing price and % change
2. Any significant news or moves today
3. Current IV estimate and IV Rank (0-100)
4. Whether a SELL signal was missed during market hours (and at what approximate time/price)

Return a JSON recap + tomorrow outlook for options sellers (covered calls AND cash secured puts).

Return ONLY raw JSON:
{
  "ticker": "${ticker}",
  "price": <number>,
  "priceChange": <number>,
  "ivRank": <number 0-100>,
  "ivLevel": <"LOW"|"MODERATE"|"HIGH"|"EXTREME">,
  "isAfterHours": true,
  "missedSignals": [
    { "strategy": <"CC"|"CSP">, "signal": <"SELL"|"WAIT">, "approxTime": <string>, "reasoning": <string> }
  ],
  "todaySummary": <string, 2 sentences about today's action>,
  "tomorrowOutlook": <string, 2-3 sentences about tomorrow's setup>,
  "tomorrowBias": <"BULLISH_CC"|"BULLISH_CSP"|"BEARISH"|"NEUTRAL">,
  "catalysts": <string>,
  "warnings": <string or null>
}`
    : `You are a professional options selling signal engine. Analyze ${ticker} (${tickerInfo.name}) for options income strategies.

Current time (ET): ${now}

Use web search to find the current stock price, today's move, and any relevant news. Then analyze:
1. Current price and % change today
2. Estimated IV Rank (0-100 scale, based on recent volatility and context)
3. Best options SELLING strategy right now: Covered Call (CC) or Cash Secured Put (CSP)
4. Specific trade setup with strike, expiry, estimated premium

Auto-detect the best strategy:
- If stock is near highs or has had a strong run: Favor COVERED CALL (sell upside)
- If stock has pulled back or is near support: Favor CASH SECURED PUT (get paid to buy)
- If IV is very low: Recommend WAIT for both strategies
- If big catalyst within 14 days: Recommend HOLD_EXISTING or WAIT

Return ONLY raw JSON:
{
  "ticker": "${ticker}",
  "price": <number>,
  "priceChange": <number>,
  "ivRank": <number 0-100>,
  "ivLevel": <"LOW"|"MODERATE"|"HIGH"|"EXTREME">,
  "recommendedStrategy": <"CC"|"CSP">,
  "signal": <"SELL"|"WAIT"|"HOLD_EXISTING">,
  "signalStrength": <"STRONG"|"MODERATE"|"WEAK">,
  "reasoning": <string, 2-3 sentences>,
  "catalysts": <string>,
  "warnings": <string or null>,
  "cc": {
    "signal": <"SELL"|"WAIT"|"HOLD_EXISTING">,
    "strike": <number>,
    "expiry": <string>,
    "dte": <number>,
    "premium": <string>,
    "yield": <string>,
    "note": <string, 1 sentence>
  },
  "csp": {
    "signal": <"SELL"|"WAIT"|"HOLD_EXISTING">,
    "strike": <number>,
    "expiry": <string>,
    "dte": <number>,
    "premium": <string>,
    "yield": <string>,
    "collateral": <string>,
    "note": <string, 1 sentence>
  }
}`;

  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1200,
      tools: [{ type: 'web_search_20250305', name: 'web_search' }],
      messages: [{ role: 'user', content: basePrompt }],
    }),
  });

  const data = await resp.json();
  const text = (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  const match = text.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No JSON returned');
  return JSON.parse(match[0]);
}

// ─── RUN CHECK ────────────────────────────────────────────────────────────────
async function runCheck() {
  if (state.loading.length > 0) return;
  const mktStatus = getMarketStatus();
  const isAH = mktStatus !== 'open';

  state.loading = [...state.selectedTickers];
  state.errors = {};
  render();

  for (const ticker of state.selectedTickers) {
    try {
      const result = await fetchSignal(ticker, isAH);
      state.signals[ticker] = { ...result, timestamp: new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }) + ' ET', isAfterHours: isAH };
      state.loading = state.loading.filter(t => t !== ticker);

      // Add notification — capture strike/expiry/premium from recommended strategy
      const recStrategy = (result.recommendedStrategy || 'CC').toLowerCase();
      const tradeData = result[recStrategy] || {};
      const notif = {
        id: Date.now() + Math.random(),
        ticker,
        signal: result.signal,
        strategy: result.recommendedStrategy || 'CC',
        price: result.price,
        ivRank: result.ivRank,
        reasoning: result.reasoning || result.todaySummary,
        strike: tradeData.strike || null,
        expiry: tradeData.expiry || null,
        dte: tradeData.dte || null,
        premium: tradeData.premium || null,
        yield: tradeData.yield || null,
        timestamp: new Date().toLocaleString('en-US', { timeZone: 'America/New_York' }) + ' ET',
        isAfterHours: isAH,
        unread: true,
      };

      state.notifications = [notif, ...state.notifications].slice(0, 50);
      state.unreadCount = state.notifications.filter(n => n.unread).length;
      saveNotifications();

      const sc = SIG_CFG[result.signal] || SIG_CFG.WAIT;
      showToast(
        `${ticker} · ${result.signal}${isAH ? ' (AH)' : ''}`,
        `$${result.price?.toFixed(2)} · IV Rank ${result.ivRank} · ${result.recommendedStrategy || 'CC'}`,
        result.signal === 'SELL' ? 'var(--green)' : result.signal === 'WAIT' ? 'var(--amber)' : 'var(--blue)'
      );

      render();
    } catch (e) {
      state.errors[ticker] = e.message;
      state.loading = state.loading.filter(t => t !== ticker);
      render();
    }
  }
}

// ─── DOM HELPERS ──────────────────────────────────────────────────────────────
function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs || {})) {
    if (k.startsWith('on') && typeof v === 'function') e.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === 'className') e.className = v;
    else if (k === 'style' && typeof v === 'object') Object.assign(e.style, v);
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

const div = (cls, ...ch) => el('div', { className: cls }, ...ch);
const span = (cls, txt) => el('span', { className: cls }, txt);

// ─── RENDER SIGNAL PANEL ──────────────────────────────────────────────────────
function renderSignalPanel() {
  const frag = document.createDocumentFragment();

  // Loading state
  if (state.loading.length > 0 && Object.keys(state.signals).length === 0) {
    const w = div('loading-wrap');
    const bars = div('loading-bars');
    for (let i = 0; i < 5; i++) bars.appendChild(div('loading-bar'));
    w.appendChild(bars);
    w.appendChild(el('div', { className: 'loading-ticker' }, `SCANNING ${state.loading.join(', ')}...`));
    frag.appendChild(w);
    return frag;
  }

  // Empty state
  if (state.selectedTickers.length === 0) {
    const d = div('empty-state');
    d.appendChild(div('empty-icon', '☝️'));
    d.appendChild(el('div', { className: 'empty-title' }, 'Select tickers above'));
    d.appendChild(el('div', { className: 'empty-sub' }, 'Choose up to 5 tickers then tap RUN CHECK'));
    frag.appendChild(d);
    return frag;
  }

  if (Object.keys(state.signals).length === 0 && state.loading.length === 0) {
    const d = div('empty-state');
    d.appendChild(div('empty-icon', '📡'));
    d.appendChild(el('div', { className: 'empty-title' }, 'No signals yet'));
    d.appendChild(el('div', { className: 'empty-sub' }, 'Tap RUN CHECK to analyze your selected tickers'));
    frag.appendChild(d);
    return frag;
  }

  // Render each ticker's signal
  for (const ticker of state.selectedTickers) {
    if (state.errors[ticker]) {
      frag.appendChild(el('div', { className: 'error-card' }, `⚠ ${ticker}: ${state.errors[ticker]}`));
      continue;
    }

    if (state.loading.includes(ticker) && !state.signals[ticker]) {
      const w = div('loading-wrap');
      w.style.padding = '32px 20px';
      const bars = div('loading-bars');
      for (let i = 0; i < 5; i++) bars.appendChild(div('loading-bar'));
      w.appendChild(bars);
      w.appendChild(el('div', { className: 'loading-ticker' }, `SCANNING ${ticker}...`));
      frag.appendChild(w);
      continue;
    }

    const s = state.signals[ticker];
    if (!s) continue;

    if (s.isAfterHours) {
      frag.appendChild(renderAHCard(s, ticker));
    } else {
      frag.appendChild(renderSignalCard(s, ticker));
    }
  }

  return frag;
}

      className: `track-btn ${id}${state.learnTrack === id ? ' active' : ''}`,
      onClick: () => { state.learnTrack = id; state.learnSection = id === 'cc' ? 'basics' : 'csp-basics'; state.openAccordion = null; render(); }
    });
    btn.appendChild(div('track-btn-icon', icon));
    btn.appendChild(el('div', { className: 'track-btn-label' }, label));
    btn.appendChild(el('div', { className: 'track-btn-sub' }, sub));
    tracks.appendChild(btn);
  });
  frag.appendChild(tracks);

  const sections = LEARN[state.learnTrack] || [];
  const activeSection = sections.find(s => s.id === state.learnSection) || sections[0];

  // Section nav
  const nav = div('course-nav');
  for (const s of sections) {
    const btn = el('button', {
      className: `course-nav-btn${s.id === (activeSection?.id) ? ` active-${state.learnTrack}` : ''}`,
      onClick: () => { state.learnSection = s.id; state.openAccordion = null; render(); }
    }, `${s.icon} ${s.title.split(':')[0].split('—')[0].trim()}`);
    nav.appendChild(btn);
  }
  frag.appendChild(nav);

  if (!activeSection) return frag;

  frag.appendChild(el('div', { className: 'course-title' }, `${activeSection.icon} ${activeSection.title}`));

  for (let i = 0; i < activeSection.content.length; i++) {
    const item = activeSection.content[i];
    const key = `${activeSection.id}-${i}`;
    const isOpen = state.openAccordion === key;

    const acc = div(`accordion-item${isOpen ? ' open' : ''}`);
    const hdr = el('button', {
      className: `accordion-hdr${isOpen ? ' open' : ''}`,
      onClick: () => { state.openAccordion = isOpen ? null : key; render(); }
    });
    hdr.appendChild(el('div', { className: 'accordion-heading' }, item.h));
    hdr.appendChild(el('div', { className: `accordion-chevron${isOpen ? ' open' : ''}` }, '▼'));
    acc.appendChild(hdr);

    if (isOpen) acc.appendChild(el('div', { className: 'accordion-body' }, item.b));
    frag.appendChild(acc);
  }

  return frag;
}

// ─── RENDER NOTIFICATIONS PANEL ───────────────────────────────────────────────
function renderNotificationsPanel() {
  const frag = document.createDocumentFragment();

  const hdr = div('notif-header');
  hdr.appendChild(el('div', { className: 'notif-count-label' }, `${state.notifications.length} notifications`));
  if (state.notifications.length > 0) {
    hdr.appendChild(el('button', {
      className: 'clear-btn',
      onClick: () => {
        state.notifications = [];
        state.unreadCount = 0;
        try { localStorage.removeItem('osd_notifications'); } catch {}
        render();
      }
    }, 'CLEAR ALL'));
  }
  frag.appendChild(hdr);

  if (state.notifications.length === 0) {
    const d = div('empty-state');
    d.appendChild(div('empty-icon', '🔔'));
    d.appendChild(el('div', { className: 'empty-title' }, 'No notifications yet'));
    d.appendChild(el('div', { className: 'empty-sub' }, 'Signals will appear here as they are generated'));
    frag.appendChild(d);
    return frag;
  }

  for (const n of state.notifications) {
    const sc = SIG_CFG[n.signal] || SIG_CFG.WAIT;
    const isCC = n.strategy === 'CC';

    const row = div(`notif-entry${n.unread ? ' unread' : ''}`);
    if (n.unread) row.appendChild(div('notif-unread-dot'));

    const dot = div('notif-dot');
    dot.style.background = sc.color;
    dot.style.boxShadow = `0 0 5px ${sc.color}60`;

    const mid = div('notif-mid');
    const top = div('notif-top');
    top.appendChild(el('div', { className: 'notif-ticker' }, n.ticker));

    const stag = el('div', { className: `notif-strategy-tag` });
    stag.style.cssText = isCC
      ? 'background:var(--green-s);border:1px solid var(--green-e);color:var(--green)'
      : 'background:var(--blue-s);border:1px solid var(--blue-e);color:var(--blue)';
    stag.textContent = n.strategy;
    top.appendChild(stag);

    if (n.isAfterHours) {
      const ah = el('div', { className: 'notif-strategy-tag' });
      ah.style.cssText = 'background:var(--purple-s);border:1px solid var(--purple-e);color:var(--purple)';
      ah.textContent = 'AH';
      top.appendChild(ah);
    }

    top.appendChild(el('div', { className: 'notif-signal-label', style: { color: sc.color } }, n.signal?.replace('_', ' ') || '—'));
    mid.appendChild(top);

    if (n.reasoning) {
      mid.appendChild(el('div', { className: 'notif-reasoning' }, n.reasoning));
    }

    // Trade details row: strike | expiry | premium
    if (n.signal === 'SELL' && (n.strike || n.expiry || n.premium)) {
      const tradeRow = div('notif-trade-row');
      if (n.strike) {
        const chip = div('notif-trade-chip');
        chip.innerHTML = `<span style="color:var(--text-3);font-size:8px">STRIKE</span> $${n.strike}`;
        tradeRow.appendChild(chip);
      }
      if (n.expiry && n.dte) {
        const chip = div('notif-trade-chip');
        chip.innerHTML = `<span style="color:var(--text-3);font-size:8px">EXP</span> ${n.expiry} (${n.dte}d)`;
        tradeRow.appendChild(chip);
      }
      if (n.premium) {
        const chip = div('notif-trade-chip');
        chip.innerHTML = `<span style="color:var(--text-3);font-size:8px">PREM</span> ${n.premium}`;
        chip.style.color = 'var(--amber)';
        tradeRow.appendChild(chip);
      }
      mid.appendChild(tradeRow);
    }

    const right = div('');
    right.style.cssText = 'text-align:right;flex-shrink:0';
    right.appendChild(el('div', { className: 'notif-time' }, n.timestamp?.split(',')[1]?.trim() || n.timestamp || ''));
    if (n.price) {
      right.appendChild(el('div', { style: { fontFamily: 'var(--mono)', fontSize: '11px', color: 'var(--text-3)', marginTop: '2px' } }, `$${n.price?.toFixed(2)}`));
    }

    row.append(dot, mid, right);
    frag.appendChild(row);
  }

  return frag;
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  const mktStatus = getMarketStatus();
  const isAH = mktStatus !== 'open';
  const isLoading = state.loading.length > 0;

  // ── HEADER
  const header = div('header');

  // ── Row 1: Logo + clock
  const headerTop = div('header-top');
  const logo = div('logo-block');
  logo.appendChild(el('span', { className: 'logo-title' }, 'Options Selling Dashboard'));
  const clockRow = div('clock-row');
  clockRow.appendChild(el('span', { className: 'live-clock' }, getLocalClockStr()));
  logo.appendChild(clockRow);
  headerTop.appendChild(logo);

  // Market pill + run button (right side — stacked column)
  const actions = div('header-actions');

  const actRow = div('header-actions-row');
  const pill = el('div', { className: `market-pill ${mktStatus}` },
    mktStatus === 'open' ? '● OPEN' : mktStatus === 'ah' ? '◐ AH' : '○ CLOSED'
  );
  actRow.appendChild(pill);

  const runBtn = el('button', {
    className: `run-btn${isLoading ? ' loading' : ''}${isAH ? ' ah-mode' : ''}`,
    onClick: runCheck,
  });

  if (isLoading) {
    runBtn.innerHTML = '<span style="animation:blink 0.7s infinite;font-size:8px">⬤</span>&nbsp;SCANNING...';
  } else if (isAH) {
    runBtn.innerHTML = '🌙 AH REVIEW';
  } else {
    const dot = div('pulse-dot');
    runBtn.appendChild(dot);
    runBtn.appendChild(document.createTextNode(' RUN'));
  }
  actRow.appendChild(runBtn);
  actions.appendChild(actRow);

  const scanInfo = getNextScanInfo();
  const scanLabel = div('next-check', scanInfo.label);
  if (scanInfo.scanning) scanLabel.style.color = 'var(--green)';
  actions.appendChild(scanLabel);

  headerTop.appendChild(actions);
  header.appendChild(headerTop);

  // Ticker selector
  const sel = div('ticker-selector');

  const selTop = div('ticker-sel-top');
  selTop.appendChild(el('div', { className: 'ticker-selector-label' }, 'TICKERS'));

  const selControls = div('ticker-sel-controls');
  selControls.appendChild(el('div', { className: 'ticker-count' }, `${state.selectedTickers.length}/${MAX_SELECTED}`));

  // Mode toggle: single vs multi
  const modeBtn = el('button', {
    className: `ticker-mode-btn${state.multiMode ? ' active' : ''}`,
    onClick: () => { state.multiMode = !state.multiMode; render(); }
  }, state.multiMode ? 'MULTI' : 'SINGLE');
  selControls.appendChild(modeBtn);

  if (state.selectedTickers.length > 0) {
    selControls.appendChild(el('button', {
      className: 'ticker-clear-btn',
      onClick: () => { state.selectedTickers = []; saveSelected(); render(); }
    }, 'CLEAR'));
  }
  selTop.appendChild(selControls);
  sel.appendChild(selTop);

  const chips = div('ticker-chips');
  for (const [ticker] of Object.entries(TICKERS)) {
    const isSelected = state.selectedTickers.includes(ticker);
    const isMaxed = !isSelected && state.selectedTickers.length >= MAX_SELECTED;
    const chip = el('button', {
      className: `ticker-chip${isSelected ? ' selected' : ''}${isMaxed && state.multiMode ? ' maxed' : ''}`,
      onClick: () => {
        if (state.multiMode) {
          // Multi: toggle on/off up to 5
          if (isMaxed) return;
          state.selectedTickers = isSelected
            ? state.selectedTickers.filter(t => t !== ticker)
            : [...state.selectedTickers, ticker];
        } else {
          // Single: one tap swaps to that ticker
          state.selectedTickers = isSelected ? [] : [ticker];
        }
        saveSelected();
        render();
      }
    }, ticker);
    chips.appendChild(chip);
  }
  sel.appendChild(chips);
  header.appendChild(sel);

  // Tabs
  const tabBar = div('tabs');
  const tabs = [
    { id: 'signal', label: '📡 Signals' },
    { id: 'learn',  label: '📚 Learn'   },
    { id: 'notifs', label: '🔔 Alerts'  },
  ];

  for (const t of tabs) {
    const btn = el('button', {
      className: `tab-btn${state.tab === t.id ? ' active' : ''}`,
      onClick: () => {
        state.tab = t.id;
        if (t.id === 'notifs') {
          state.notifications = state.notifications.map(n => ({ ...n, unread: false }));
          state.unreadCount = 0;
          saveNotifications();
        }
        render();
      }
    }, t.label);

    if (t.id === 'notifs' && state.unreadCount > 0) {
      btn.appendChild(el('div', { className: 'tab-badge' }, String(state.unreadCount)));
    }

    tabBar.appendChild(btn);
  }
  header.appendChild(tabBar);
  app.appendChild(header);

  // ── CONTENT
  const content = div('content');
  if (state.tab === 'signal') content.appendChild(renderSignalPanel());
  else if (state.tab === 'learn') content.appendChild(renderLearnPanel());
  else content.appendChild(renderNotificationsPanel());
  app.appendChild(content);

  // ── FOOTER
  const footer = div('footer');
  footer.appendChild(el('div', { className: 'footer-text' }, 'NOT FINANCIAL ADVICE · EDUCATIONAL USE ONLY · VERIFY WITH YOUR BROKER'));
  app.appendChild(footer);

  // ── TOAST
  if (state.toast) {
    const t = state.toast;
    const toast = div('toast');
    toast.style.borderColor = t.color + '40';
    toast.style.background = `rgba(13,13,15,0.96)`;
    toast.appendChild(div('toast-icon', '🔔'));
    const tb = div('toast-body');
    tb.appendChild(el('div', { className: 'toast-title', style: { color: t.color } }, t.title));
    tb.appendChild(div('toast-sub', t.sub));
    toast.appendChild(tb);
    app.appendChild(toast);
    requestAnimationFrame(() => requestAnimationFrame(() => toast.classList.add('show')));
  }

  // Update next check label periodically (no full re-render)
  const nc = document.querySelector('.next-check');
  if (nc) nc.textContent = getNextCheckLabel();
}

// ─── SCHEDULER ────────────────────────────────────────────────────────────────
// Runs every second: updates clock + countdown. Fires signal scan on the hour during market hours.
setInterval(() => {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const h = et.getHours(), m = et.getMinutes(), s = et.getSeconds(), d = et.getDay();
  const isWeekday = d >= 1 && d <= 5;
  const minsET = h * 60 + m;
  const duringMarket = isWeekday && minsET >= 9*60+30 && minsET < 16*60;

  // Fire on the hour (m===0, s<5) during market hours
  if (duringMarket && m === 0 && s < 5 && !state.loading.length && state.selectedTickers.length > 0) {
    runCheck();
  }

  // Update clock + countdown without full re-render
  const clockEl = document.querySelector('.live-clock');
  if (clockEl) clockEl.textContent = getLocalClockStr();
  const nc = document.querySelector('.next-check');
  if (nc) nc.textContent = getNextCheckLabel();
}, 1000);

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadStorage();
state.unreadCount = state.notifications.filter(n => n.unread).length;
render();
</script>
</body>
</html>
